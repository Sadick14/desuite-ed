version: '3.8'
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: school-management-system:latest
    restart: always
    working_dir: /var/www/html
    volumes:
      - ./storage:/var/www/html/storage:cached
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
    depends_on:
      - db

  db:
    image: mysql:8.0
    restart: always
    volumes:
      - dbdata:/var/lib/mysql:delegated
    environment:
      MYSQL_DATABASE: school_management
      MYSQL_USER: school_admin
      MYSQL_PASSWORD: secure-password
      MYSQL_ROOT_PASSWORD: super-secure-root-password

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/conf.d:/etc/nginx/conf.d
      - ./public:/var/www/html/public:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - app

  redis:
    image: redis:7-alpine
    restart: always

volumes:
  dbdata:
